<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroMind V3 Titan - Ultra RT</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #000; color: #cffafe; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #083344; border-radius: 10px; }
        .glow-cyan { box-shadow: 0 0 20px rgba(6, 182, 212, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('terminal');
            const [messages, setMessages] = useState([
                { role: 'assistant', content: 'TITAN ULTRA-RT ONLINE. Monitoring jaringan Solana & Phantom aktif secara penuh.' }
            ]);
            const [input, setInput] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [marketData, setMarketData] = useState({
                solPrice: 154.20,
                tps: 3850,
                dominance: 3.45,
                vol24h: '2.4B'
            });

            // Simulasi pembaruan pasar real-time setiap 2 detik
            useEffect(() => {
                const interval = setInterval(() => {
                    setMarketData(prev => ({
                        ...prev,
                        solPrice: +(prev.solPrice + (Math.random() * 0.6 - 0.3)).toFixed(2),
                        tps: Math.floor(Math.random() * 400) + 3600
                    }));
                }, 2000);
                return () => clearInterval(interval);
            }, []);

            const signals = useMemo(() => [
                { coin: "JUP", entry: "1.45", exit: "1.80", sl: "1.38", status: "BULLISH", risk: "Low" },
                { coin: "JTO", entry: "3.20", exit: "4.25", sl: "2.95", status: "STABLE", risk: "Med" },
                { coin: "WIF", entry: "3.85", exit: "5.10", sl: "3.50", status: "VOLATILE", risk: "High" }
            ], []);

            const handleCommand = async () => {
                if (!input.trim()) return;
                const userMsg = { role: 'user', content: input };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setIsProcessing(true);

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: input }] }],
                            systemInstruction: { 
                                parts: [{ text: "Anda adalah NeuroMind Titan Ultra RT. Fokus pada ekosistem Solana/Phantom. Berikan sinyal trading real-time, analisis likuiditas, dan deteksi rugpull. Gunakan data harga SOL saat ini: " + marketData.solPrice }] 
                            }
                        })
                    });
                    const data = await response.json();
                    setMessages(prev => [...prev, { role: 'assistant', content: data.candidates?.[0]?.content?.parts?.[0]?.text }]);
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'assistant', content: "ERROR: Gagal sinkronisasi data pasar." }]);
                } finally { 
                    setIsProcessing(false); 
                    setTimeout(() => lucide.createIcons(), 100);
                }
            };

            useEffect(() => { lucide.createIcons(); }, [activeTab]);

            return (
                <div className="flex h-screen bg-black overflow-hidden selection:bg-cyan-500/30">
                    {/* SIDEBAR */}
                    <aside className="w-72 bg-[#020202] border-r border-cyan-900/20 flex flex-col p-6">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="p-2 bg-cyan-600 rounded-lg shadow-[0_0_15px_rgba(6,182,212,0.4)]">
                                <i data-lucide="zap" className="text-black w-6 h-6 fill-current"></i>
                            </div>
                            <div>
                                <h1 className="font-black text-xl italic tracking-tighter">TITAN_RT</h1>
                                <span className="text-[8px] text-cyan-800 tracking-[0.3em] font-bold">PHANTOM_SYNC</span>
                            </div>
                        </div>

                        <nav className="flex-1 space-y-2">
                            <TabButton active={activeTab === 'terminal'} onClick={() => setActiveTab('terminal')} icon="terminal" label="Terminal Analisis" />
                            <TabButton active={activeTab === 'signals'} onClick={() => setActiveTab('signals')} icon="crosshair" label="Sinyal Trading" />
                        </nav>

                        <div className="mt-auto bg-cyan-950/10 border border-cyan-500/10 rounded-xl p-4">
                            <div className="flex items-center gap-2 text-[10px] text-emerald-500 font-bold mb-3">
                                <div className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div>
                                LIVE_MARKET_FEED
                            </div>
                            <div className="space-y-2 text-[11px]">
                                <div className="flex justify-between">
                                    <span className="text-slate-500 font-bold">SOL_PRICE</span>
                                    <span className="text-cyan-400 font-black">${marketData.solPrice}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-slate-500 font-bold">NET_TPS</span>
                                    <span className="text-purple-400 font-black">{marketData.tps}</span>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* MAIN */}
                    <main className="flex-1 flex flex-col bg-[radial-gradient(circle_at_50%_0%,_#081e1e_0%,_#000_100%)]">
                        <header className="h-16 border-b border-cyan-900/20 px-8 flex items-center justify-between backdrop-blur-md bg-black/40">
                            <div className="flex gap-12">
                                <HUDItem label="ENGINE_MODE" value="ULTRA_REAL_TIME" color="text-cyan-400" />
                                <HUDItem label="ACCURACY_CORE" value="10.0/10" color="text-amber-400" />
                                <HUDItem label="SYNC_STATUS" value="OPTIMAL" color="text-emerald-400" />
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="text-right">
                                    <div className="text-[8px] text-cyan-800 font-bold">VERIFIED_ANALYST</div>
                                    <div className="text-[10px] text-cyan-500 font-black tracking-widest uppercase">Titan_Core</div>
                                </div>
                                <div className="p-2 border border-cyan-500/20 rounded-full bg-cyan-500/5">
                                    <i data-lucide="shield-check" className="text-cyan-500 w-5 h-5"></i>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-hidden p-6">
                            <div className="h-full bg-[#050505]/60 border border-cyan-950/30 rounded-2xl flex flex-col backdrop-blur-md shadow-2xl">
                                {activeTab === 'terminal' ? (
                                    <div className="flex-1 flex flex-col overflow-hidden">
                                        <div className="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar">
                                            {messages.map((m, i) => (
                                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                    <div className={`max-w-[85%] p-5 rounded-xl border ${m.role === 'user' ? 'bg-slate-900/40 border-slate-700 text-slate-300' : 'bg-cyan-950/5 border-cyan-500/20 text-cyan-50'}`}>
                                                        <div className="text-[9px] font-black uppercase mb-1 text-cyan-700 tracking-widest">{m.role === 'user' ? 'INPUT_STREAM' : 'TITAN_DECONSTRUCTION'}</div>
                                                        <p className="text-sm leading-relaxed whitespace-pre-wrap">{m.content}</p>
                                                    </div>
                                                </div>
                                            ))}
                                            {isProcessing && <div className="flex items-center gap-2 text-cyan-500 text-xs animate-pulse italic"><i data-lucide="refresh-cw" className="w-4 h-4 animate-spin"></i> Menghitung probabilitas pasar...</div>}
                                        </div>
                                        <div className="p-6 bg-black/40 border-t border-cyan-950/30 flex gap-4">
                                            <div className="relative flex-1">
                                                <i data-lucide="terminal" className="absolute left-4 top-1/2 -translate-y-1/2 text-cyan-900 w-5 h-5"></i>
                                                <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleCommand()} className="w-full bg-[#080808] border border-cyan-900/40 rounded-xl py-4 pl-12 pr-4 text-sm focus:border-cyan-500/60 outline-none transition-all" placeholder="Masukkan query pasar atau mint address..." />
                                            </div>
                                            <button onClick={handleCommand} className="bg-cyan-600 hover:bg-cyan-500 text-black px-8 rounded-xl font-bold transition-all shadow-lg shadow-cyan-600/20">
                                                ANALYZE
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex-1 p-8 overflow-y-auto space-y-6 custom-scrollbar">
                                        <h3 className="text-xs font-black tracking-[0.4em] text-cyan-700 uppercase mb-4">Trading Signals (Real-Time Sync)</h3>
                                        <div className="grid grid-cols-1 gap-4">
                                            {signals.map((s, i) => (
                                                <div key={i} className="group p-6 bg-cyan-950/5 border border-cyan-500/10 rounded-2xl hover:border-cyan-500/40 transition-all flex flex-col md:flex-row justify-between items-center gap-6">
                                                    <div className="flex items-center gap-6">
                                                        <div className={`p-4 rounded-xl ${s.status === 'BULLISH' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-amber-500/10 text-amber-400'}`}>
                                                            <i data-lucide={s.status === 'BULLISH' ? 'trending-up' : 'activity'} className="w-8 h-8"></i>
                                                        </div>
                                                        <div>
                                                            <div className="flex items-center gap-3">
                                                                <h4 className="font-black text-2xl tracking-tighter">{s.coin}</h4>
                                                                <span className={`text-[10px] font-black px-2 py-0.5 rounded ${s.risk === 'Low' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}`}>{s.risk}_RISK</span>
                                                            </div>
                                                            <p className="text-[10px] text-slate-500 font-bold tracking-widest mt-1">SINKRONISASI: PHANTOM_DEX</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-12">
                                                        <SignalStat label="ENTRY" value={`$${s.entry}`} color="text-emerald-400" />
                                                        <SignalStat label="TARGET" value={`$${s.exit}`} color="text-cyan-400" />
                                                        <SignalStat label="STOP_LOSS" value={`$${s.sl}`} color="text-red-500" />
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const TabButton = ({ active, onClick, icon, label }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-4 p-4 rounded-xl transition-all ${active ? 'bg-cyan-500/10 text-cyan-400 border border-cyan-500/20' : 'text-slate-600 hover:text-cyan-400 hover:bg-cyan-500/5'}`}>
                <i data-lucide={icon} className="w-5 h-5"></i>
                <span className="text-[11px] font-black tracking-widest uppercase">{label}</span>
            </button>
        );

        const HUDItem = ({ label, value, color }) => (
            <div className="flex flex-col">
                <span className="text-[8px] text-cyan-900 font-black tracking-[0.2em]">{label}</span>
                <span className={`text-xs font-black ${color}`}>{value}</span>
            </div>
        );

        const SignalStat = ({ label, value, color }) => (
            <div className="text-right">
                <div className="text-[9px] text-slate-600 font-bold tracking-widest">{label}</div>
                <div className={`text-lg font-black ${color}`}>{value}</div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
